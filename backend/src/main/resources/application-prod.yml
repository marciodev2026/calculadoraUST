spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:ust_calculator}
    username: ${DB_USER:ust_user}
    password: ${DB_PASSWORD:ust_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
  mail:
    host: ${MAIL_HOST:mailpit}
    port: ${MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    root: INFO
    br.gov.ust.calculator: INFO
    org.springframework.security: WARN
